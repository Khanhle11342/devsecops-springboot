stages:
  - build
  - security
  - deploy

build:
  stage: build
  tags:
    - ubuntu
  script:
    - echo "=== BUILD SPRING BOOT APPLICATION ==="
    - mvn clean package -DskipTests
  artifacts:
    paths:
      - target/*.jar
    expire_in: 1 day

security_check:
  stage: security
  tags:
    - ubuntu
  script:
    - echo "=== SECURITY CHECK STAGE ==="
    - echo "Static code analysis and dependency scanning (conceptual)"
  allow_failure: true

deploy:
  stage: deploy
  tags:
    - ubuntu
  dependencies:
    - build
  script:
    - ls -l target
    - echo "=== DEPLOY SPRING BOOT APPLICATION ==="
    - pkill -f 'java -jar' || true
    - nohup java -jar target/*.jar > app.log 2>&1 &
  only:
    - main
