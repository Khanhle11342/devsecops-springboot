image: maven:3.9.6-eclipse-temurin-17

services:
  - docker:dind

stages:
  - build
  - docker

build:
  stage: build
  script:
    - mvn clean package -DskipTests

docker-build:
  stage: docker
  image: docker:24
  services:
    - docker:dind
  variables:
    DOCKER_TLS_CERTDIR: ""
  script:
    - docker build -t shoeshop-app .

